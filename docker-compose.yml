version: "3.9"

networks:
  resolvehub-network:
    driver: bridge
    name: resolvehub-network
  services-net:
    external: true
    name: services-net

volumes:
  resolvehub_mongo_data:
    name: resolvehub_mongo_data

services:
  resolvehub-mongo:
    image: mongo:7-jammy
    container_name: resolvehub-mongo
    restart: unless-stopped
    environment:
      MONGO_INITDB_DATABASE: resolvehub
    volumes:
      - resolvehub_mongo_data:/data/db
    networks:
      - resolvehub-network
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')", "--quiet"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    mem_limit: 256m

  resolvehub-backend:
    build:
      context: ./campus-service-backend
      dockerfile: Dockerfile
    container_name: resolvehub-backend
    restart: unless-stopped
    env_file:
      - .env
    environment:
      NODE_ENV: production
      PORT: 5000
      MONGO_URI: mongodb://resolvehub-mongo:27017/resolvehub
      APP_BASE_PATH: /resolvehub
    depends_on:
      resolvehub-mongo:
        condition: service_healthy
    networks:
      - resolvehub-network
      - services-net
    ports:
      - "127.0.0.1:5001:5000"
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:5000/health', r => process.exit(r.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s
    mem_limit: 256m

  resolvehub-frontend:
    build:
      context: ./campus-frontend
      dockerfile: Dockerfile
      args:
        VITE_APP_BASE_PATH: /resolvehub
    container_name: resolvehub-frontend
    restart: unless-stopped
    networks:
      - resolvehub-network
      - services-net
    mem_limit: 64m
